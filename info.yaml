# Tiny Tapeout project configuration

project:
  title:        "Adaptive Traffic Light Controller"
  author:       "Sebastian Danquah"
  discord:      ""
  description:  "An adaptive traffic light ASIC designed using custom logic gates in Verilog."
  language:     "Verilog"
  clock_hz:     0

  # How many tiles your design occupies? (1x1 is standard)
  tiles:        "1x1"

  # Your top module name in project.v
  top_module:   "tt_um_example"

  # Source files inside the src/ directory
  source_files:
    - "project.v"

# Pinout definition
pinout:
  # Inputs
  ui[0]: "sensor"
  ui[1]: "timer"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "red_light"
  uo[1]: "yellow_light"
  uo[2]: "green_light"
  uo[3]: ""
  uo[4]: ""
  uo[5]: ""
  uo[6]: ""
  uo[7]: ""

  # Bidirectional IOs
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Documentation section
documentation:
  author:       "Sebastian Danquah"
  title:        "Adaptive Traffic Light Controller"
  language:     "Verilog"
  description:  "An adaptive traffic light ASIC designed using custom logic gates in Verilog."
  how_it_works: "Uses sensor and timer inputs to drive RGB traffic light outputs."
  how_to_test:  "Toggle input pins ui[0] and ui[1] to drive uo[0], uo[1], and uo[2] outputs."
